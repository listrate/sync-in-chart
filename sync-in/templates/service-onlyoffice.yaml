{{- if .Values.onlyoffice.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sync-in.onlyoffice-name" . }}
  labels:
    {{- include "sync-in.labels" . | nindent 4 }}
    app.kubernetes.io/component: onlyoffice
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sync-in.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onlyoffice
{{- end }}
