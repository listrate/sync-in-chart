{{- if .Values.mariadb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sync-in.fullname" . }}-mariadb
  labels:
    {{- include "sync-in.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
stringData:
  root-password: {{ required "mariadb.rootPassword is required when mariadb.enabled is true" .Values.mariadb.rootPassword }}
{{- end }}
