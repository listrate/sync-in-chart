{{- if .Values.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "sync-in.fullname" . }}
  labels:
    {{- include "sync-in.labels" . | nindent 4 }}
  {{- with .Values.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.route.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- with .Values.route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "sync-in.nginx-name" . }}
          port: 80
    {{- if .Values.onlyoffice.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /onlyoffice
      backendRefs:
        - name: {{ include "sync-in.nginx-name" . }}
          port: 80
    {{- end }}
  {{- with .Values.route.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
