apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sync-in.nginx-name" . }}
  labels:
    {{- include "sync-in.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "sync-in.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx
  template:
    metadata:
      annotations:
        checksum/config: {{ printf "%s%s" (include (print $.Template.BasePath "/configmap-nginx.yaml") .) (include (print $.Template.BasePath "/configmap-nginx-onlyoffice.yaml") .) | sha256sum }}
      labels:
        {{- include "sync-in.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx
    spec:
      serviceAccountName: {{ include "sync-in.fullname" . }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .Values.nginx.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            {{- if .Values.onlyoffice.enabled }}
            - name: nginx-onlyoffice
              mountPath: /etc/nginx/onlyoffice.conf
              subPath: onlyoffice.conf
            {{- end }}
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.nginx.securityContext | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "sync-in.nginx-name" . }}
        {{- if .Values.onlyoffice.enabled }}
        - name: nginx-onlyoffice
          configMap:
            name: {{ include "sync-in.nginx-name" . }}-onlyoffice
        {{- end }}
      {{- with .Values.nginx.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nginx.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nginx.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
