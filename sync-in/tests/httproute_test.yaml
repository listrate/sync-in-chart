suite: httproute
templates:
  - templates/httproute.yaml
tests:
  - it: renders when route is enabled
    set:
      route.enabled: true
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in
      - equal:
          path: spec.parentRefs[0].name
          value: envoy-external
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-sync-in-nginx

  - it: does not render when route is disabled
    set:
      mariadb.rootPassword: testpass
    asserts:
      - hasDocuments:
          count: 0

  - it: adds onlyoffice rule when enabled
    set:
      route.enabled: true
      onlyoffice.enabled: true
      onlyoffice.jwtSecret: testsecret
      mariadb.rootPassword: testpass
    asserts:
      - equal:
          path: spec.rules[1].matches[0].path.value
          value: /onlyoffice

  - it: does not add onlyoffice rule when disabled
    set:
      route.enabled: true
      mariadb.rootPassword: testpass
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 1

  - it: sets hostnames when provided
    set:
      route.enabled: true
      route.hostnames:
        - drive.example.com
      mariadb.rootPassword: testpass
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: drive.example.com

  - it: uses custom parentRefs
    set:
      route.enabled: true
      route.parentRefs:
        - name: my-gateway
          namespace: my-ns
          sectionName: https
      mariadb.rootPassword: testpass
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: my-ns
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https
