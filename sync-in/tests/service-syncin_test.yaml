suite: service sync-in
templates:
  - templates/service-syncin.yaml
tests:
  - it: renders with correct port and selector
    set:
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.type
          value: ClusterIP
