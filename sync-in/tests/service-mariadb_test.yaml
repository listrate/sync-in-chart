suite: service mariadb
templates:
  - templates/service-mariadb.yaml
tests:
  - it: renders with correct port when mariadb is enabled
    set:
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in-mariadb
      - equal:
          path: spec.ports[0].port
          value: 3306

  - it: does not render when mariadb is disabled
    set:
      mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0
