suite: secret mariadb
templates:
  - templates/secret-mariadb.yaml
tests:
  - it: renders when mariadb is enabled
    set:
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in-mariadb
      - equal:
          path: stringData.root-password
          value: testpass

  - it: does not render when mariadb is disabled
    set:
      mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0
