suite: secret env
templates:
  - templates/secret-env.yaml
tests:
  - it: renders with default values
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in-env
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "provider: 'mysql'"

  - it: includes mysql url when mariadb is enabled
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "mysql:"

  - it: does not render mysql block when externalDatabase.existingSecret is set
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.enabled: false
      externalDatabase.existingSecret: ext-db-secret
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - notMatchRegex:
          path: stringData["environment.yaml"]
          pattern: "mysql:"

  - it: does not render when existingEnvSecret is set
    set:
      syncin.existingEnvSecret: my-custom-env
    asserts:
      - hasDocuments:
          count: 0

  - it: renders oidc block when auth provider is oidc
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.provider: oidc
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
      auth.oidc.issuerUrl: https://auth.example.com
      auth.oidc.clientId: myclient
      auth.oidc.clientSecret: mysecret
      auth.oidc.redirectUri: https://drive.example.com/api/auth/oidc/callback
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "oidc:"
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "issuerUrl: 'https://auth.example.com'"
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "clientId: 'myclient'"

  - it: does not render oidc block when auth provider is mysql
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - notMatchRegex:
          path: stringData["environment.yaml"]
          pattern: "oidc:"

  - it: renders onlyoffice enabled in applications when onlyoffice is enabled
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      onlyoffice.enabled: true
      onlyoffice.jwtSecret: testsecret
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "onlyoffice:\\s*\\n\\s*enabled: true"

  - it: renders onlyoffice disabled in applications when onlyoffice is disabled
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "onlyoffice:\\s*\\n\\s*enabled: false"

  - it: renders collabora and eurooffice disabled
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.rootPassword: testpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "collabora:\\s*\\n\\s*enabled: false"
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "eurooffice:\\s*\\n\\s*enabled: false"

  - it: includes external database url when mariadb is disabled
    documentSelector:
      path: kind
      value: Secret
    set:
      mariadb.enabled: false
      externalDatabase.host: db.example.com
      externalDatabase.password: extpass
      auth.encryptionKey: testkey
      auth.token.access.secret: access-secret
      auth.token.refresh.secret: refresh-secret
    asserts:
      - matchRegex:
          path: stringData["environment.yaml"]
          pattern: "mysql://root:extpass@db.example.com:3306/sync_in"
