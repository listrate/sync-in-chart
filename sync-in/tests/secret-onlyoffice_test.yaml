suite: secret onlyoffice
templates:
  - templates/secret-onlyoffice.yaml
tests:
  - it: renders when onlyoffice is enabled and no existingSecret
    set:
      onlyoffice.enabled: true
      onlyoffice.jwtSecret: testsecret
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in-onlyoffice
      - equal:
          path: stringData.JWT_SECRET
          value: testsecret

  - it: does not render when onlyoffice is disabled
    set:
      mariadb.rootPassword: testpass
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render when existingSecret is set
    set:
      onlyoffice.enabled: true
      onlyoffice.existingSecret: my-oo-secret
      onlyoffice.jwtSecretKey: jwt
      mariadb.rootPassword: testpass
    asserts:
      - hasDocuments:
          count: 0
