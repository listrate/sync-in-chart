suite: service nginx
templates:
  - templates/service-nginx.yaml
tests:
  - it: renders with correct port
    set:
      mariadb.rootPassword: testpass
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sync-in-nginx
      - equal:
          path: spec.ports[0].port
          value: 80
