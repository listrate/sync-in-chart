name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.0 --verify=false || helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.0
      - name: Lint
        run: helm lint ./sync-in -f test-values.yaml
      - name: Unit tests
        run: helm unittest ./sync-in -f test-values.yaml
      - name: Template dry-run
        run: helm template test-release ./sync-in -f test-values.yaml --no-hooks > /dev/null
